<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Sign In | Sudan Taxation Chamber</title>
        <style>
            * { box-sizing: border-box; }
            body {
                margin: 0; min-height: 100vh;
                font-family: "Inter", "Segoe UI", Arial, sans-serif;
                color: #1a2a3a;
                background: #f5f3ef;
                display: flex; flex-direction: column;
            }
            header {
                background: #0b2a3d;
                color: #ffffff;
                padding: 14px 24px;
                border-bottom: 3px solid #c8a84e;
            }
            .topbar {
                max-width: 1160px; margin: 0 auto;
                display: flex; align-items: center; justify-content: space-between; gap: 16px;
            }
            .brand {
                display: flex; align-items: center; gap: 12px;
                font-weight: 800; font-size: 15px;
            }
            .mark {
                width: 36px; height: 36px;
                border-radius: 50%;
                background: #c8a84e;
                color: #0b2a3d;
                display: grid; place-items: center;
                font-weight: 900; font-size: 16px;
            }
            nav { display: flex; flex-wrap: wrap; gap: 8px; }
            nav a {
                color: #ffffff; text-decoration: none;
                padding: 6px 12px; border-radius: 999px;
                font-size: 13px; font-weight: 600;
                border: 1px solid rgba(255,255,255,0.2);
                transition: 0.1s;
            }
            nav a:hover { background: rgba(255,255,255,0.1); border-color: #c8a84e; }
            main {
                flex: 1;
                display: flex; align-items: center; justify-content: center;
                padding: 28px 24px 60px;
            }
            .card {
                background: #ffffff;
                border: 1px solid #e0dbd2;
                border-radius: 16px;
                padding: 32px;
                box-shadow: 0 4px 16px rgba(0,0,0,0.03);
                width: 100%;
                max-width: 420px;
            }
            h1 {
                margin-top: 0; color: #0b2a3d;
                font-size: 24px; letter-spacing: -0.02em;
            }
            p { color: #4a6070; line-height: 1.65; font-size: 15px; margin: 8px 0 20px; }
            label {
                display: block; font-size: 13px; font-weight: 700;
                color: #3a5060; margin-bottom: 6px;
            }
            input {
                width: 100%;
                border: 1px solid #d0cac0;
                border-radius: 10px;
                padding: 11px 12px;
                font: inherit;
                margin-bottom: 12px;
                background: #ffffff;
            }
            input:focus { outline: none; border-color: #0b2a3d; box-shadow: 0 0 0 2px rgba(11,42,61,0.12); }
            button {
                width: 100%;
                border: 0; border-radius: 10px;
                padding: 11px 16px;
                font: inherit; font-weight: 700;
                cursor: pointer;
                background: #0b2a3d;
                color: #ffffff;
                transition: 0.1s;
            }
            button:hover { background: #123a4f; }
            button:disabled { opacity: 0.5; cursor: default; }
            .result {
                margin-top: 12px; border-radius: 10px;
                padding: 12px; font-size: 14px; line-height: 1.55;
            }
            .error {
                background: #fcecec; border: 1px solid #ecc8c8;
                color: #8a2a2a;
            }
            .info {
                background: #e8eef3; border: 1px solid #c0ceda;
                color: #1a4a6a;
            }
            .note {
                font-size: 13px; color: #5a7080;
                margin: 16px 0 0;
            }
            code { background: #f0ede8; padding: 2px 6px; border-radius: 4px; font-size: 13px; }
        </style>
    </head>
    <body>
        <header>
            <div class="topbar">
                <div class="brand">
                    <div class="mark">STC</div>
                    <span>Sudan Taxation Chamber</span>
                </div>
                <nav>
                    <a href="/">Home</a>
                    <a href="/sandbox">Sandbox</a>
                    <a href="/api">API Reference</a>
                </nav>
            </div>
        </header>

        <main>
            <div class="card">
                <h1>Taxpayer sign-in</h1>
                <p>Enter your registered taxpayer TIN and password to access the e-invoicing portal.</p>

                <form onsubmit="signIn(event)">
                    <label for="tin">TIN</label>
                    <input id="tin" name="tin" autocomplete="username" placeholder="100011" />

                    <label for="password">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="password" />

                    <button id="signInBtn" type="submit">Sign in</button>
                </form>

                <p class="note">Demo taxpayers use password: <code>password</code></p>

                <div id="loginResult"></div>
            </div>
        </main>

        <script>
            async function signIn(event) {
                event.preventDefault();
                const tin = document.getElementById("tin").value.trim();
                const password = document.getElementById("password").value;
                if (!tin || !password) {
                    show("loginResult", "error", "TIN and password are required.");
                    return;
                }

                const button = document.getElementById("signInBtn");
                button.disabled = true;
                button.textContent = "Signing in...";

                try {
                    const response = await fetch("/e-invoicing/signin", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ tin, password }),
                    });
                    const payload = await safeJson(response);
                    if (!response.ok) {
                        show("loginResult", "error", payload.message || "Sign-in failed.");
                        return;
                    }

                    window.location.href = "/e-invoicing";
                } catch (error) {
                    show("loginResult", "error", "Network error: " + error.message);
                } finally {
                    button.disabled = false;
                    button.textContent = "Sign in";
                }
            }

            async function safeJson(response) {
                try { return await response.json(); }
                catch (_error) { return { message: response.statusText || "Request failed" }; }
            }

            function show(target, type, message) {
                document.getElementById(target).innerHTML = '<div class="result ' + type + '">' + message + '</div>';
            }
        </script>
    </body>
</html>
